<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PMP Exam Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3348;--accent:#6c8eff;--accent2:#a78bfa;--success:#34d399;--danger:#f87171;--warning:#fbbf24;--text:#e8eaf6;--muted:#8892b0;--card-radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
html{height:-webkit-fill-available}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;height:-webkit-fill-available;overflow:hidden}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:248px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 12px;padding-top:max(18px,env(safe-area-inset-top));padding-bottom:max(18px,env(safe-area-inset-bottom));gap:5px;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:50}
#app{margin-left:248px;height:100%;display:flex;flex-direction:column}
.logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);margin-bottom:12px;padding:0 6px}
.logo span{color:var(--muted);font-size:11px;display:block;font-family:'DM Sans',sans-serif;margin-top:2px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit;width:100%;text-align:left;transition:all .15s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:rgba(108,142,255,.15);color:var(--accent);font-weight:500}
.nav-icon{width:18px;text-align:center;font-size:14px}
.nav-divider{border-top:1px solid var(--border);margin:6px 0}
.stat-mini{display:flex;justify-content:space-between;padding:5px 10px;font-size:12px;color:var(--muted)}
.stat-mini strong{color:var(--text)}
.type-filter{padding:6px 10px}
.type-filter-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:7px}
.type-chips{display:flex;flex-direction:column;gap:5px}
.type-chip{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s}
.type-chip:hover{border-color:var(--accent);color:var(--text)}
.type-chip.active{border-color:var(--accent);background:rgba(108,142,255,.12);color:var(--accent)}
.chip-count{font-size:10px;background:var(--border);padding:1px 6px;border-radius:10px}
.type-chip.active .chip-count{background:rgba(108,142,255,.2);color:var(--accent)}
#main{display:flex;flex-direction:column;flex:1;overflow:hidden}
#topbar{padding:12px 24px;padding-top:max(12px,env(safe-area-inset-top));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);flex-wrap:wrap}
.topbar-title{font-family:'DM Serif Display',serif;font-size:18px;white-space:nowrap}
.progress-wrap{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);flex:1;flex-wrap:wrap}
.progress-bar{width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px;padding-bottom:max(24px,env(safe-area-inset-bottom))}
.jump-wrap{display:flex;align-items:center;gap:6px}
.jump-wrap label{color:var(--muted);white-space:nowrap;font-size:12px}
.jump-input{width:64px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-family:inherit;font-size:12px;text-align:center}
.jump-input:focus{outline:none;border-color:var(--accent)}
.jump-btn{padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--accent);cursor:pointer;font-size:12px;font-family:inherit}
.jump-btn:hover{background:rgba(108,142,255,.15)}
select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-family:inherit;font-size:12px;cursor:pointer}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:26px;max-width:780px;margin:0 auto;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.q-meta{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase}
.badge-num{background:rgba(108,142,255,.15);color:var(--accent)}
.badge-single{background:rgba(52,211,153,.1);color:var(--success)}
.badge-multi{background:rgba(251,191,36,.12);color:var(--warning)}
.badge-ok{background:rgba(52,211,153,.1);color:var(--success)}
.badge-fail{background:rgba(248,113,113,.1);color:var(--danger)}
.multi-hint{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:9px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);margin-bottom:16px;font-size:13px;color:var(--warning)}
.q-text{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:22px}
.options-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.opt-btn{display:flex;align-items:flex-start;gap:11px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;font-family:inherit;font-size:14px;color:var(--text);text-align:left;transition:all .15s;width:100%}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(108,142,255,.08)}
.opt-btn.selected{border-color:var(--accent);background:rgba(108,142,255,.12)}
.opt-btn.correct{border-color:var(--success);background:rgba(52,211,153,.09)}
.opt-btn.wrong{border-color:var(--danger);background:rgba(248,113,113,.09)}
.opt-btn.missed{border-color:var(--warning);background:rgba(251,191,36,.07)}
.opt-btn:disabled{cursor:default}
.opt-key{min-width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;flex-shrink:0;transition:all .15s}
.opt-btn.correct .opt-key{background:var(--success);color:#0f1117}
.opt-btn.wrong .opt-key{background:var(--danger);color:#0f1117}
.opt-btn.missed .opt-key{background:var(--warning);color:#0f1117}
.opt-btn.selected .opt-key{background:var(--accent);color:#0f1117}
.opt-text{line-height:1.5;flex:1}
.opt-suffix{font-size:11px;margin-left:auto;padding-left:8px;flex-shrink:0}
.submit-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.vote-section{margin-top:14px;display:none}
.vote-section.show{display:block}
.vote-title{font-size:10px;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.vote-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:12px}
.vote-key{width:16px;font-weight:600;color:var(--muted)}
.vote-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.vote-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .6s .1s}
.vote-bar-fill.top{background:var(--success)}
.vote-pct{min-width:30px;font-size:11px;color:var(--muted);text-align:right}
.ai-box{margin-top:14px;padding:16px 18px;border-radius:10px;border:1px solid rgba(167,139,250,.25);background:rgba(167,139,250,.05);font-size:14px;line-height:1.75;display:none}
.ai-box.show{display:block}
.ai-box-header{font-weight:600;color:var(--accent2);margin-bottom:10px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.action-row{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:18px;flex-wrap:wrap}
.action-right{display:flex;gap:8px;align-items:center}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .15s}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#0f1117;font-weight:600}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-ai{background:rgba(167,139,250,.12);color:var(--accent2);border:1px solid rgba(167,139,250,.25)}
.btn-ai:hover:not(:disabled){background:rgba(167,139,250,.22)}
.btn-ai:disabled{opacity:.35;cursor:not-allowed}
.btn-submit{background:var(--warning);color:#0f1117;font-weight:600}
.btn-submit:disabled{opacity:.35;cursor:not-allowed}
.btn-flag{background:transparent;color:var(--muted);border:1px solid var(--border);padding:8px 12px;font-size:15px;line-height:1}
.btn-flag:hover{border-color:var(--warning);color:var(--warning)}
.btn-flag.flagged{color:var(--warning);border-color:var(--warning);background:rgba(251,191,36,.08)}
.badge-flag{background:rgba(251,191,36,.15);color:var(--warning);border:1px solid rgba(251,191,36,.3)}
.dd-layout{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.dd-panel{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px}
.dd-panel-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:10px}
.drag-item{padding:8px 12px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);cursor:grab;font-size:13px;line-height:1.4;margin-bottom:6px;transition:all .15s;user-select:none}
.drag-item:hover{border-color:var(--accent);background:rgba(108,142,255,.07)}
.drag-item.dragging{opacity:.3;cursor:grabbing}
.drag-item.placed{opacity:.22;pointer-events:none;border-style:dashed}
.drop-zone{min-height:50px;border:2px dashed var(--border);border-radius:7px;margin-bottom:6px;display:flex;align-items:stretch;transition:all .15s;position:relative;overflow:hidden}
.drop-zone.drag-over{border-color:var(--accent);background:rgba(108,142,255,.06)}
.drop-zone.filled{border-style:solid;border-color:var(--accent)}
.drop-zone.correct-zone{border-color:var(--success);background:rgba(52,211,153,.06)}
.drop-zone.wrong-zone{border-color:var(--danger);background:rgba(248,113,113,.06)}
.drop-label{position:absolute;top:4px;left:8px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.dropped-item{padding:18px 12px 6px;font-size:13px;line-height:1.4;color:var(--text);cursor:pointer;width:100%}
.result-chip{position:absolute;right:6px;top:6px;font-size:12px;font-weight:700}
.dd-score-bar{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.dd-pip{width:26px;height:5px;border-radius:3px;background:var(--border);cursor:pointer;transition:all .15s}
.dd-pip:hover{transform:scaleY(2)}
.dd-pip.done-ok{background:var(--success)}
.dd-pip.done-fail{background:var(--danger)}
.dd-pip.current{background:var(--accent)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:16px}
.dash-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.dash-val{font-size:28px;font-weight:600;font-family:'DM Serif Display',serif}
.c-accent{color:var(--accent)}.c-success{color:var(--success)}.c-danger{color:var(--danger)}.c-warning{color:var(--warning)}
/* IMPORT */
.import-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:28px;max-width:720px;margin:0 auto}
.import-card h2{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:8px}
.import-card p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.import-stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.import-stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--muted)}
.import-stat strong{display:block;font-size:20px;font-weight:600;color:var(--accent);font-family:'DM Serif Display',serif}
.drop-area{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px}
.drop-area:hover,.drop-area.drag-active{border-color:var(--accent);background:rgba(108,142,255,.06)}
.drop-icon{font-size:32px;margin-bottom:8px}
.drop-text{font-size:14px;color:var(--muted)}
.drop-text b{color:var(--text)}
.import-preview{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;display:none}
.preview-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.preview-item{font-size:13px;padding:8px 0;border-bottom:1px solid var(--border);line-height:1.5}
.preview-item:last-child{border-bottom:none}
.preview-num{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(108,142,255,.15);color:var(--accent);margin-right:6px}
.msg-box{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.msg-box.show{display:block}
.msg-err{background:rgba(248,113,113,.08);border:1px solid var(--danger);color:var(--danger)}
.msg-ok{background:rgba(52,211,153,.08);border:1px solid var(--success);color:var(--success)}
.format-hint{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;color:var(--muted);line-height:1.7;margin-top:16px;white-space:pre-wrap;word-break:break-all}
/* EXAM MODE */
.exam-setup{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:28px;max-width:600px;margin:0 auto;text-align:center}
.exam-setup h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px}
.exam-setup p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.exam-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;text-align:left}
.exam-opt{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s}
.exam-opt:hover{border-color:var(--accent)}
.exam-opt.selected{border-color:var(--accent);background:rgba(108,142,255,.1)}
.exam-opt-title{font-weight:600;font-size:14px;margin-bottom:4px}
.exam-opt-desc{font-size:12px;color:var(--muted)}
.exam-timer{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;max-width:780px;margin-left:auto;margin-right:auto}
.timer-display{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:1px}
.timer-display.urgent{color:var(--danger);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.5}}
.timer-info{display:flex;gap:16px;font-size:13px;color:var(--muted)}
.timer-info span strong{color:var(--text)}
.exam-progress{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:16px;max-width:780px;margin-left:auto;margin-right:auto}
.exam-dot{width:14px;height:14px;border-radius:3px;background:var(--border);cursor:pointer;transition:all .1s;font-size:0}
.exam-dot:hover{transform:scale(1.3)}
.exam-dot.answered{background:var(--accent)}
.exam-dot.flagged{background:var(--warning)}
.exam-dot.current{outline:2px solid var(--text);outline-offset:1px}
.exam-result{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:36px;max-width:640px;margin:0 auto;text-align:center}
.exam-result h2{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:6px}
.exam-result-score{font-family:'DM Serif Display',serif;font-size:64px;margin:16px 0}
.exam-result-bar{height:20px;border-radius:10px;overflow:hidden;display:flex;gap:2px;margin-bottom:20px}
.flag-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.flag-btn:hover{border-color:var(--warning);color:var(--warning)}
.flag-btn.flagged{border-color:var(--warning);background:rgba(251,191,36,.12);color:var(--warning)}
#toast{position:fixed;bottom:22px;right:22px;padding:9px 16px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);font-size:13px;opacity:0;transform:translateY(5px);transition:all .2s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:none}
#toast.t-success{border-color:var(--success);color:var(--success)}
#toast.t-error{border-color:var(--danger);color:var(--danger)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HAMBURGER */
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;margin-right:4px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.hamburger:hover{background:var(--surface2)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sidebar-logo-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.sidebar-close{display:none;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1;touch-action:manipulation;-webkit-tap-highlight-color:transparent;flex-shrink:0;margin-top:2px}
.sidebar-close:hover{background:var(--surface2);color:var(--text)}

/* ── MOBILE ── */
@media(max-width:768px){
  .hamburger{display:block}
  #app{margin-left:0}
  #sidebar{left:-280px;width:85vw;max-width:300px;min-width:unset;transition:left .25s ease;box-shadow:none}
  #sidebar.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.4)}
  .sidebar-overlay.open{display:block}
  .sidebar-close{display:block}
  .logo{margin-bottom:0}
  #topbar{padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));gap:8px}
  .topbar-title{font-size:16px}
  .progress-wrap{gap:6px;font-size:11px}
  .progress-bar{width:60px}
  .jump-wrap{display:none}
  #content{padding:14px}
  .q-card{padding:18px;border-radius:12px}
  .q-meta{gap:4px;margin-bottom:12px}
  .badge{font-size:9px;padding:2px 7px}
  .q-text{font-size:14px;line-height:1.7;margin-bottom:16px}
  .opt-btn{padding:10px 12px;font-size:13px;border-radius:9px;gap:9px}
  .opt-key{min-width:24px;height:24px;font-size:11px;border-radius:5px}
  .action-row{gap:6px}
  .btn{padding:8px 14px;font-size:12px}
  .vote-row{font-size:11px}
  .ai-box{padding:12px 14px;font-size:13px}
  /* DD mobile */
  .dd-layout{grid-template-columns:1fr;gap:12px}
  .drag-item{padding:7px 10px;font-size:12px}
  .drop-zone{min-height:44px}
  .drop-label{font-size:9px}
  .dropped-item{padding:16px 10px 5px;font-size:12px}
  .dd-score-bar{gap:3px}
  .dd-pip{width:18px;height:4px}
  /* Exam mobile */
  .exam-timer{padding:10px 12px;flex-wrap:wrap;gap:8px;border-radius:8px}
  .timer-display{font-size:18px}
  .timer-info{gap:10px;font-size:11px}
  .exam-progress{gap:2px}
  .exam-dot{width:10px;height:10px;border-radius:2px}
  .exam-options{grid-template-columns:1fr;gap:8px}
  .exam-opt{padding:12px}
  .exam-result-score{font-size:48px}
  /* Dashboard mobile */
  .dash-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .dash-card{padding:12px}
  .dash-val{font-size:22px}
  /* Import mobile */
  .import-card{padding:18px}
  .import-stats{flex-direction:column;gap:8px}
  .drop-area{padding:28px 14px}
  /* Multi-hint */
  .multi-hint{font-size:12px;padding:8px 12px}
  .submit-row{font-size:12px}
  /* Type filter sidebar */
  .type-chip{padding:6px 8px;font-size:11px}
  .stat-mini{font-size:11px;padding:4px 10px}
  /* Flag btn */
  .flag-btn{font-size:11px;padding:5px 8px}
}

@media(max-width:380px){
  #topbar{padding:8px 10px}
  .topbar-title{font-size:14px}
  .progress-bar{display:none}
  #content{padding:10px}

/* AUTH */
.auth-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--border);margin-top:auto}
.auth-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#0f1117;flex-shrink:0}
.auth-info{flex:1;overflow:hidden}
.auth-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.auth-status{font-size:10px;color:var(--success)}
.auth-status.offline{color:var(--muted)}
.auth-btn-sm{padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:11px;font-family:inherit;flex-shrink:0}
.auth-btn-sm:hover{color:var(--text);border-color:var(--accent)}

/* AUTH MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:90%;max-width:400px;animation:slideIn .2s ease}
.modal-box h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:6px;text-align:center}
.modal-box p{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.auth-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;margin-bottom:12px}
.auth-input:focus{outline:none;border-color:var(--accent)}
.auth-submit{width:100%;padding:11px;border-radius:8px;border:none;background:var(--accent);color:#0f1117;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px}
.auth-submit:hover{opacity:.9}
.auth-submit:disabled{opacity:.4;cursor:not-allowed}
.auth-switch{text-align:center;font-size:13px;color:var(--muted)}
.auth-switch a{color:var(--accent);cursor:pointer;text-decoration:none}
.auth-switch a:hover{text-decoration:underline}
.auth-error{background:rgba(248,113,113,.1);border:1px solid var(--danger);color:var(--danger);padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:12px;display:none}
.auth-error.show{display:block}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;font-size:12px;color:var(--muted)}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-google{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.auth-google:hover{border-color:var(--accent);background:rgba(108,142,255,.06)}
.sync-indicator{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(52,211,153,.1);color:var(--success);display:none}
.sync-indicator.show{display:inline-block}
.sync-indicator.syncing{background:rgba(251,191,36,.1);color:var(--warning);animation:pulse 1s infinite}
